<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Product</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/user/index}">ENSET</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/index}">Products</a>
                </li>
            </ul>
            <form method="post" th:action="@{/logout}">
                <button class="btn btn-light btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4 col-md-6">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0" th:text="${product.id == null} ? 'Add Product' : 'Edit Product'"></h4>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/save}" method="post" th:object="${product}">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" th:field="*{name}" class="form-control">
                    <div class="text-danger" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control">
                    <div class="text-danger" th:errors="*{price}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" th:field="*{quantity}" class="form-control">
                    <div class="text-danger" th:errors="*{quantity}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Save</button>
                    <a th:href="@{/user/index}" class="btn btn-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
