<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/index}">ENSET</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/index}">Products</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/formProducts}">New Product</a>
                </li>
            </ul>

            <span class="navbar-text text-white me-3" sec:authentication="name"></span>

            <form method="post" th:action="@{/logout}">
                <button class="btn btn-light btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <form method="get" th:action="@{/user/index}" class="row g-2 mb-3">
        <div class="col-auto">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search">
        </div>
        <div class="col-auto">
            <button class="btn btn-primary" type="submit">Search</button>
        </div>
    </form>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.quantity}"></td>
            <td>
                <a class="btn btn-warning btn-sm"
                   th:href="@{/admin/editProduct(id=${p.id})}"
                   sec:authorize="hasRole('ADMIN')">Edit</a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/admin/delete(id=${p.id},page=${currentPage},keyword=${keyword})}"
                   onclick="return confirm('Are you sure?')"
                   sec:authorize="hasRole('ADMIN')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div>
        <a th:each="pg,st : ${pages}"
           th:href="@{/index(page=${st.index},keyword=${keyword})}"
           th:text="${st.index}"
           th:class="${st.index==currentPage} ? 'btn btn-primary ms-1' : 'btn btn-outline-primary ms-1'">
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
